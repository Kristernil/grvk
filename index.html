<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRVK — Bridging East and West</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=ZCOOL+QingKe+HuangYou&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --phosphor: #33ff41;
    --phosphor-dim: #1a8c22;
    --phosphor-glow: #00ff1588;
    --phosphor-faint: #0d3b10;
    --bg: #020804;
    --scanline: rgba(0,0,0,0.18);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  .crt {
    position: relative;
    width: 700px;
    height: 420px;
    background: #010601;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 2px #0a1a0a,
      0 0 0 6px #050d05,
      0 0 60px #00ff1522,
      0 0 120px #00ff1511,
      inset 0 0 80px rgba(0,0,0,0.9);
  }

  .crt::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      var(--scanline) 3px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  .crt::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 40%,
      rgba(0,0,0,0.6) 100%
    );
    pointer-events: none;
    z-index: 11;
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.85; }
    94% { opacity: 1; }
    96% { opacity: 0.9; }
    97% { opacity: 1; }
  }

  .screen {
    position: absolute;
    inset: 0;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 0;
    z-index: 5;
    animation: screenflicker 12s infinite;
  }

  @keyframes screenflicker {
    0%,100% { opacity: 1; }
    45% { opacity: 1; }
    45.5% { opacity: 0.88; }
    46% { opacity: 1; }
  }

  .sys-line {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--phosphor-dim);
    letter-spacing: 0.15em;
    margin-bottom: 6px;
    opacity: 0;
    animation: fadein 0.3s ease forwards;
    animation-delay: 0.2s;
    text-shadow: 0 0 8px var(--phosphor-dim);
  }

  .divider {
    width: 100%;
    border: none;
    border-top: 1px solid var(--phosphor-dim);
    margin: 8px 0;
    opacity: 0;
    animation: fadein 0.3s ease forwards;
  }

  .logo-wrap {
    display: flex;
    align-items: baseline;
    margin: 18px 0 6px 0;
    opacity: 0;
    animation: fadein 0.6s ease forwards;
    animation-delay: 0.8s;
  }

  .logo-text {
    font-family: 'VT323', monospace;
    font-size: 148px;
    line-height: 1;
    color: var(--phosphor);
    letter-spacing: 0.05em;
    text-shadow:
      0 0 10px var(--phosphor),
      0 0 30px var(--phosphor-glow),
      0 0 60px #00ff1544,
      0 0 100px #00ff1522;
    position: relative;
  }

  .logo-text::after {
    content: 'GRVK';
    position: absolute;
    left: 0; top: 0;
    color: var(--phosphor);
    clip-path: inset(45% 0 48% 0);
    transform: translateX(-3px);
    opacity: 0;
    animation: glitch 6s infinite;
    text-shadow: none;
    filter: brightness(1.4);
  }

  @keyframes glitch {
    0%,100% { transform: translateX(0); clip-path: inset(45% 0 48% 0); opacity:0; }
    88% { opacity: 0; }
    89% { transform: translateX(-4px); clip-path: inset(30% 0 58% 0); opacity: 0.7; }
    89.5% { transform: translateX(3px); clip-path: inset(55% 0 30% 0); opacity: 0.5; }
    90% { opacity: 0; }
  }

  .tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--phosphor-dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadein 0.4s ease forwards;
    animation-delay: 1.3s;
    text-shadow: 0 0 10px var(--phosphor-dim);
  }

  .data-block {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
    opacity: 0;
    animation: fadein 0.4s ease forwards;
    animation-delay: 1.8s;
  }

  .data-row {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10.5px;
    color: var(--phosphor-dim);
    letter-spacing: 0.12em;
    text-shadow: 0 0 6px var(--phosphor-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .data-row a {
    color: var(--phosphor);
    text-shadow: 0 0 8px var(--phosphor);
    text-decoration: none;
    transition: text-shadow 0.2s ease, color 0.2s ease;
  }

  .data-row a:hover {
    color: #fff;
    text-shadow: 0 0 12px var(--phosphor), 0 0 24px var(--phosphor);
  }

  .cursor {
    display: inline-block;
    width: 10px;
    height: 14px;
    background: var(--phosphor);
    margin-left: 4px;
    vertical-align: middle;
    box-shadow: 0 0 8px var(--phosphor);
    animation: blink 1.1s step-end infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .noise {
    position: absolute;
    inset: 0;
    z-index: 9;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    animation: shiftnoise 0.5s steps(2) infinite;
  }

  @keyframes shiftnoise {
    0% { transform: translate(0,0); }
    25% { transform: translate(-1px, 1px); }
    50% { transform: translate(1px, -1px); }
    75% { transform: translate(-1px, -1px); }
    100% { transform: translate(0,0); }
  }

  .roll {
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to bottom, transparent, rgba(51,255,65,0.06), transparent);
    z-index: 8;
    pointer-events: none;
    animation: roll 14s linear infinite;
  }

  @keyframes roll {
    from { top: -10px; }
    to { top: 430px; }
  }

  /* Mobile responsiveness */
  @media (max-width: 740px) {
    html, body {
      align-items: center;
      justify-content: flex-start;
      min-height: 100%;
      height: auto;
      padding: 20px 0;
      overflow-y: auto;
    }
    .crt {
      width: 95vw;
      height: auto;
      min-height: unset;
      margin: auto 0;
    }
    .screen {
      position: relative;
      inset: unset;
      padding: 20px 22px;
    }
    .logo-wrap { margin: 10px 0 4px 0; }
    .logo-text { font-size: 22vw; }
    .sys-line { font-size: 8.5px; }
    .tagline { font-size: 9.5px; letter-spacing: 0.18em; margin-bottom: 12px; }
    .data-row { font-size: 9px; }
    .data-block { margin-top: 16px; }
  }
</style>
</head>
<body>

<div class="crt">
  <div class="noise"></div>
  <div class="roll"></div>
  <div class="screen">

    <div class="sys-line">MU/TH/UR 1688 &nbsp;//&nbsp; GRVK PUBLISHING SYSTEMS &nbsp;//&nbsp; UPLINK ESTABLISHED</div>
    <hr class="divider" style="animation-delay:0.5s;">

    <div class="logo-wrap">
      <div class="logo-text">GRVK</div>
    </div>

    <div class="tagline" style="margin-bottom:0; padding-bottom:10px;">// BRIDGING EAST AND WEST //</div>

    <hr class="divider" style="animation-delay:1.6s; opacity:0; margin: 5px 0 12px 0;">

    <div class="tagline" style="font-family:'ZCOOL QingKe HuangYou',monospace; font-size:22px; letter-spacing:0.4em; animation-delay:1.7s; margin-bottom:0; padding-bottom: 30px;">架桥东西</div>

    <div class="data-block">
      <div class="data-row">
        <span>CONTACT</span>
        <span><a href="mailto:contact@grvk.com">contact@grvk.com</a></span>
      </div>
      <div class="data-row">
        <span>SYSTEM STATUS</span>
        <span style="color:var(--phosphor); text-shadow: 0 0 8px var(--phosphor);">NOMINAL <span class="cursor"></span></span>
      </div>
      <div class="data-row">
        <span>CLASSIFICATION</span>
        <span style="color:var(--phosphor); text-shadow: 0 0 8px var(--phosphor);">UNRESTRICTED</span>
      </div>
      <div class="data-row">
        <span>SPECIAL ORDER</span>
        <span style="color:var(--phosphor); text-shadow: 0 0 8px var(--phosphor);">42-GRVK</span>
      </div>
    </div>

  </div>
</div>

</body></html>
